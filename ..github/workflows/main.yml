name: 24-7 Aternos Bot
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install & Run
      run: |
        npm install mineflayer
        timeout 21000s node index.js || echo "Restarting..."
    - name: Restart Workflow
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git commit --allow-empty -m "Restarting Bot"
        git push
        
